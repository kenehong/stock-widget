<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Tech Dashboard Widget</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0b10;--card:#12141d;--card2:#1a1d2a;--border:#252840;--text:#e0e2f0;--text2:#8890b0;--accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--orange:#f97316;--cyan:#06b6d4;--pink:#ec4899;--gradeA:#22c55e;--gradeB:#06b6d4;--gradeC:#eab308;--gradeD:#f97316;--gradeF:#ef4444}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.header{background:linear-gradient(135deg,#0f0c29 0%,#1a1a4e 50%,#0f0c29 100%);padding:28px 24px 18px;border-bottom:2px solid var(--accent);text-align:center;position:relative}
.header h1{font-size:1.8em;font-weight:800;background:linear-gradient(135deg,#c7d2fe,#818cf8,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.header p{color:var(--text2);font-size:0.85em}
.header-meta{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:10px;flex-wrap:wrap}
.freshness{font-size:0.72em;color:var(--text2);display:flex;align-items:center;gap:4px}
.freshness .dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block}
.freshness.stale .dot{background:var(--yellow)}
.btn-sm{padding:5px 14px;border-radius:8px;font-size:0.72em;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card2);color:var(--text2);transition:all .2s}
.btn-sm:hover{border-color:var(--accent);color:var(--accent2)}
.btn-sm.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-sm.primary:hover{background:#4f46e5}
.wrap{max-width:1400px;margin:0 auto;padding:16px 12px 60px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Layout: cards left + ranking right */
.dashboard-layout{display:grid;grid-template-columns:1fr 280px;gap:20px;margin:16px 0;align-items:start}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.comp-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;transition:all .2s;cursor:pointer;position:relative;overflow:hidden}
.comp-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 30px rgba(99,102,241,0.1)}
.comp-card.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.comp-card-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.comp-ticker{font-size:1.3em;font-weight:800;color:var(--accent2)}
.comp-name{font-size:0.78em;color:var(--text2);flex:1}
.comp-price{text-align:right}
.comp-price .price{font-size:1.05em;font-weight:700}
.comp-price .mcap{font-size:0.65em;color:var(--text2)}
.grade-badge{min-width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4em;font-weight:900;color:#fff;flex-shrink:0}
.comp-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.comp-metric{background:var(--card2);border-radius:8px;padding:8px;text-align:center}
.comp-metric .cm-val{font-size:0.9em;font-weight:700}
.comp-metric .cm-label{font-size:0.6em;color:var(--text2);margin-top:2px}

/* Ranking Sidebar */
.ranking-sidebar{position:sticky;top:16px}
.rank-section{margin-bottom:14px}
.rank-title{font-size:0.72em;font-weight:700;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.rank-cards{display:flex;flex-direction:column;gap:4px}
.rank-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 10px;display:flex;align-items:center;gap:8px}
.rank-medal{font-size:1.1em}
.rank-info{flex:1;display:flex;align-items:center;gap:6px}
.rank-info .ri-cat{display:none}
.rank-info .ri-ticker{font-size:0.82em;font-weight:700;color:var(--accent2)}
.rank-info .ri-val{font-size:0.68em;color:var(--text2)}

/* News */
.news-filters{display:flex;gap:6px;flex-wrap:wrap;margin:16px 0 8px;position:sticky;top:42px;z-index:40;background:var(--bg);padding:8px 0}
.news-filter{padding:7px 16px;border-radius:20px;font-size:0.75em;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text2);transition:all .2s}
.news-filter:hover{border-color:var(--accent);color:var(--accent2)}
.news-filter.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.news-feed{max-width:800px;margin:0 auto}
.news-company-section{margin-bottom:28px}
.news-company-header{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:2px solid var(--accent);margin-bottom:16px}
.news-company-ticker{font-size:1.4em;font-weight:900;color:var(--accent2)}
.news-company-name{font-size:0.85em;color:var(--text2)}
.news-company-grade{font-size:0.75em;font-weight:700;padding:3px 10px;border-radius:6px;color:#fff}
.news-article{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;transition:border-color .2s}
.news-article:hover{border-color:var(--accent)}
.news-article-date{font-size:0.68em;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.news-article-date::before{content:'';width:8px;height:8px;border-radius:50%;flex-shrink:0}
.news-article.positive .news-article-date::before{background:var(--green)}
.news-article.negative .news-article-date::before{background:var(--red)}
.news-article.neutral .news-article-date::before{background:var(--yellow)}
.news-article-headline{font-size:1em;font-weight:700;color:var(--text);margin-bottom:8px;line-height:1.4}
.news-article-detail{font-size:0.82em;color:var(--text2);line-height:1.7;margin-bottom:12px}
.news-article-impact{display:flex;align-items:flex-start;gap:8px;font-size:0.78em;color:var(--cyan);margin-bottom:12px;padding:8px 12px;background:rgba(6,182,212,0.06);border-radius:8px}
.news-article-impact::before{content:'Impact';font-size:0.7em;font-weight:700;background:var(--cyan);color:var(--bg);padding:2px 6px;border-radius:4px;flex-shrink:0}
.news-easy-box{background:var(--card2);border-radius:12px;padding:14px 16px;font-size:0.82em;color:var(--text);line-height:1.7;border-left:3px solid var(--yellow);margin-bottom:10px}
.news-easy-label{font-size:0.68em;font-weight:700;color:var(--yellow);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.news-source{font-size:0.68em;margin-top:8px}
.news-source a{color:var(--cyan);text-decoration:none;border-bottom:1px dashed rgba(6,182,212,0.3)}
.news-source a:hover{border-bottom-color:var(--cyan)}

/* API Settings */
.api-panel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin:16px 0;display:none}
.api-panel.visible{display:block}
.api-panel h3{font-size:0.9em;color:var(--accent2);margin-bottom:10px}
.api-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.api-input{flex:1;min-width:200px;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:0.82em;outline:none}
.api-input:focus{border-color:var(--accent)}
.api-note{font-size:0.68em;color:var(--text2);margin-top:8px}
.api-note a{color:var(--cyan)}

/* Detail Modal */
.dm-desc{font-size:0.68em;color:var(--text2);margin-top:2px;font-weight:400;line-height:1.4}
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;padding:20px}
.detail-overlay.visible{display:flex}
.detail-modal{background:var(--card);border:1px solid var(--border);border-radius:16px;max-width:700px;width:100%;max-height:85vh;overflow-y:auto;padding:24px}
.detail-close{float:right;background:none;border:none;color:var(--text2);font-size:1.5em;cursor:pointer}
.detail-close:hover{color:var(--text)}
.detail-head{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.detail-ticker{font-size:1.8em;font-weight:900;color:var(--accent2)}
.detail-name{font-size:0.9em;color:var(--text2)}
.detail-metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px}
.dm-item{display:flex;flex-direction:column;padding:10px 12px;background:var(--card2);border-radius:8px}
.dm-top{display:flex;justify-content:space-between;align-items:center}
.dm-label{font-size:0.78em;color:var(--text2)}
.dm-value{font-size:0.85em;font-weight:700}
.dm-grade{display:inline-block;padding:1px 6px;border-radius:4px;font-size:0.7em;font-weight:700;margin-left:6px}

/* Chart */
.chart-container{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin:16px 0}
.chart-container canvas{max-height:350px}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--text2)}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.disclaimer{text-align:center;font-size:0.65em;color:var(--text2);margin-top:30px;opacity:0.5;padding:0 20px}
@media(max-width:1100px){
.dashboard-layout{grid-template-columns:1fr}
.ranking-sidebar{position:static;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
}
@media(max-width:768px){
.cards-grid{grid-template-columns:1fr}
.comp-metrics{grid-template-columns:repeat(2,1fr)}
.detail-metrics{grid-template-columns:1fr}
.header h1{font-size:1.4em}
.ranking-sidebar{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="header">
<h1>Big Tech Dashboard</h1>
<p>MAG7 + AMD 재무 지표 한눈에 비교</p>
<div class="header-meta">
<div class="freshness" id="freshness"><span class="dot"></span> <span id="freshnessText">2026-02-21 기준</span></div>
<button class="btn-sm" onclick="toggleApi()">API 설정</button>

</div>
</div>

<div class="wrap">
<div class="api-panel" id="apiPanel">
<h3>Financial Modeling Prep API 연동</h3>
<div class="api-row">
<input class="api-input" id="apiKey" type="password" placeholder="FMP API Key 입력..." value="">
<button class="btn-sm primary" onclick="saveApiKey()">저장</button>
<button class="btn-sm" onclick="testApi()">테스트</button>
</div>
<div class="api-note">무료 API 키 발급: <a href="https://financialmodelingprep.com/developer" target="_blank">financialmodelingprep.com</a> (일 250건 무료)</div>
<div id="apiStatus" style="font-size:0.72em;margin-top:6px"></div>
</div>

<!-- Dashboard -->
<div class="dashboard-layout">
<div class="cards-grid" id="cardsGrid"></div>
<div class="ranking-sidebar" id="rankingContent"></div>
</div>

<div class="disclaimer">이 대시보드는 교육 목적이며, 투자 조언이 아닙니다. 데이터는 2026년 2월 기준 공개 재무제표를 기반으로 합니다.</div>
</div>

<!-- Detail Modal -->
<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
<div class="detail-modal" id="detailModal"></div>
</div>

    { date:'2026-01-29', sentiment:'positive', headline:'Q1 2026 사상 최대 분기 매출 $1,438억 달성', detail:'분기 매출 $1,438억(전년비 16%↑), EPS $2.84(19%↑). iPhone 매출 $853억(23%↑)으로 모든 지역에서 역대 최고 기록. 중국 매출 38% 급증($255억). 서비스 매출도 사상 최고 $300억 돌파.', impact:'아이폰16 판매 호조와 중국 시장 회복 확인. 애널리스트 목표가 $292~$350.', easy:'애플은 아이폰을 만드는 회사예요. 이번에 아이폰이 역대 가장 많이 팔렸어요! 특히 중국에서도 엄청 인기가 많았대요. 마치 학교 매점에서 가장 맛있는 빵이 하루 만에 다 팔린 것처럼요.', source:'https://www.apple.com/newsroom/2026/01/apple-reports-first-quarter-results/', sourceLabel:'Apple Newsroom' },

const GC = {A:'var(--gradeA)',B:'var(--gradeB)',C:'var(--gradeC)',D:'var(--gradeD)',F:'var(--gradeF)'};
const GB = {A:'rgba(34,197,94,0.2)',B:'rgba(6,182,212,0.2)',C:'rgba(234,179,8,0.15)',D:'rgba(249,115,22,0.15)',F:'rgba(239,68,68,0.15)'};
const GS = {A:4,B:3,C:2,D:1,F:0};

function grade(v,bp,hib){
  if(v==null||isNaN(v))return null;
  if(hib){return v>=bp[0]?'A':v>=bp[1]?'B':v>=bp[2]?'C':v>=bp[3]?'D':'F'}
  return v<=bp[0]?'A':v<=bp[1]?'B':v<=bp[2]?'C':v<=bp[3]?'D':'F';
}
function avgG(gs){
  const v=gs.filter(g=>g!=null);if(!v.length)return null;
  const a=v.reduce((s,g)=>s+GS[g],0)/v.length;
  return a>=3.5?'A':a>=2.5?'B':a>=1.5?'C':a>=0.5?'D':'F';
}

function analyzeCompany(d){
  const b=BENCHMARKS[d.sector]||BENCHMARKS.bigtech;
  const g={
    pe:grade(d.pe,b.pe.bp,b.pe.hib), fpe:grade(d.fpe,b.fpe.bp,b.fpe.hib),
    ps:grade(d.ps,b.ps.bp,b.ps.hib), peg:grade(d.peg,b.peg.bp,b.peg.hib),
    evebitda:grade(d.evebitda,b.evebitda.bp,b.evebitda.hib),
    revgrowth:grade(d.revgrowth,b.revgrowth.bp,b.revgrowth.hib),
    epsgrowth:grade(d.epsgrowth,b.epsgrowth.bp,b.epsgrowth.hib),
    gm:grade(d.gm,b.gm.bp,b.gm.hib), om:grade(d.om,b.om.bp,b.om.hib)
  };
  const s1=avgG([g.pe,g.fpe,g.ps,g.peg,g.evebitda]);
  const s2=avgG([g.revgrowth,g.epsgrowth]);
  const s3=avgG([g.gm,g.om]);
  let g_fcfq=null;
  if(d.ocf&&d.ni&&d.ni>0){const r=d.ocf/d.ni;g_fcfq=r>=1.2?'A':r>=1.05?'B':r>=0.85?'C':r>=0.65?'D':'F'}
  let g_fcfp=null;
  if(d.fcf!=null){g_fcfp=d.fcf>0?(d.ocf&&d.fcf/d.ocf>0.6?'A':d.fcf/(d.ocf||1)>0.4?'B':'C'):'F'}
  const s4=avgG([g_fcfq,g_fcfp]);
  const steps=[s1,s2,s3,s4];
  const w=[0.25,0.30,0.20,0.25];
  let tw=0,ts=0;
  steps.forEach((s,i)=>{if(s){ts+=GS[s]*w[i];tw+=w[i]}});
  const os=tw>0?ts/tw:0;
  const overall=os>=3.5?'A':os>=2.5?'B':os>=1.5?'C':os>=0.5?'D':'F';
  return{grades:g,steps:{val:s1,growth:s2,profit:s3,cashflow:s4},overall,score:os};
}

function renderRankings(){

    {label:'종합 최고',key:'overall',icon:'5'}
  ];
  const medals=['&#129351;','&#129352;','&#129353;'];
  let html='';
  cats.forEach(cat=>{
    const sorted=[...TICKERS].sort((a,b)=>{

      const gb=cat.key==='overall'?analyses[b].score:GS[analyses[b].steps[cat.key]]||0;

    });
    html+=`<div class="rank-section"><div class="rank-title">${cat.label}</div><div class="rank-cards">`;
    sorted.slice(0,3).forEach((t,i)=>{
      const d=DATA[t],a=analyses[t];

      html+=`<div class="rank-card">
        <div class="rank-medal">${medals[i]}</div>

    });
    html+='</div></div>';
  });
  document.getElementById('rankingContent').innerHTML=html;
}

function getComputedColor(g){return{A:'#22c55e',B:'#06b6d4',C:'#eab308',D:'#f97316',F:'#ef4444'}[g]||'#666'}

function openDetail(t){
  const d=DATA[t],a=analyses[t];
  const metrics=[
    {l:'P/E',k:'pe',v:d.pe+'x',g:a.grades.pe},{l:'Forward P/E',k:'fpe',v:d.fpe+'x',g:a.grades.fpe},
    {l:'P/S',k:'ps',v:d.ps+'x',g:a.grades.ps},{l:'PEG',k:'peg',v:d.peg+'x',g:a.grades.peg},
    {l:'EV/EBITDA',k:'evebitda',v:d.evebitda+'x',g:a.grades.evebitda},
    {l:'매출 성장률',k:'revgrowth',v:(d.revgrowth>0?'+':'')+d.revgrowth+'%',g:a.grades.revgrowth},
    {l:'EPS 성장률',k:'epsgrowth',v:(d.epsgrowth>0?'+':'')+d.epsgrowth+'%',g:a.grades.epsgrowth},
    {l:'Gross Margin',k:'gm',v:d.gm+'%',g:a.grades.gm},
    {l:'Op. Margin',k:'om',v:d.om+'%',g:a.grades.om},
    {l:'FCF',k:'fcf',v:'$'+(d.fcf/1000).toFixed(1)+'B',g:null},
    {l:'OCF',k:'ocf',v:'$'+(d.ocf/1000).toFixed(1)+'B',g:null},
    {l:'Net Income',k:'ni',v:'$'+(d.ni/1000).toFixed(1)+'B',g:null},
  ];
  const stepLabels=['밸류에이션','성장','수익성','현금흐름'];
  const stepKeys=['val','growth','profit','cashflow'];
  document.getElementById('detailModal').innerHTML=`
    <button class="detail-close" onclick="closeDetail()">&times;</button>
    <div class="detail-head">
      <div class="grade-badge" style="background:${GC[a.overall]};width:56px;height:56px;font-size:1.8em;border-radius:14px">${a.overall}</div>
      <div>
        <div class="detail-ticker">${t}</div>
        <div class="detail-name">${d.name} | ${d.revenue} | $${d.price} | ${d.mcap}</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      ${stepKeys.map((k,i)=>{const g=a.steps[k];return`<div style="flex:1;min-width:80px;text-align:center;padding:10px;background:${g?GB[g]:'var(--card2)'};border-radius:10px">
        <div style="font-size:0.65em;color:var(--text2)">${stepLabels[i]}</div>
        <div style="font-size:1.3em;font-weight:800;color:${g?GC[g]:'var(--text2)'}">${g||'-'}</div>
      </div>`}).join('')}
    </div>
    <div class="detail-metrics">
      ${metrics.map(m=>{const tip=MTIP[m.k];return`<div class="dm-item">
        <div class="dm-top">
          <span class="dm-label">${m.l}</span>
          <span class="dm-value">${m.v}${m.g?`<span class="dm-grade" style="color:${GC[m.g]};background:${GB[m.g]}">${m.g}</span>`:''}</span>
        </div>
        ${tip?`<div class="dm-desc">${tip.analogy}</div>`:''}
      </div>`}).join('')}
    </div>
    ${NEWS[t]?`<div style="margin-top:20px;border-top:1px solid var(--border);padding-top:16px">
      <div style="font-size:0.95em;font-weight:700;color:var(--accent2);margin-bottom:14px">최근 뉴스</div>
      ${NEWS[t].map(n=>`<div class="news-article ${n.sentiment||'neutral'}" style="margin-bottom:12px">
        <div class="news-article-date">${n.date}</div>
        <div class="news-article-headline">${n.headline}</div>
        ${n.detail?`<div class="news-article-detail">${n.detail}</div>`:''}
        <div class="news-article-impact">${n.impact}</div>
        <div class="news-easy-box">
          <div class="news-easy-label">초등학생도 이해하는 설명</div>
          ${n.easy}
        </div>
        ${n.source?`<div class="news-source">출처: <a href="${n.source}" target="_blank" rel="noopener">${n.sourceLabel||n.source}</a></div>`:''}
      </div>`).join('')}
    </div>`:''}
  `;
  document.getElementById('detailOverlay').classList.add('visible');
}

function closeDetail(){document.getElementById('detailOverlay').classList.remove('visible')}

// ==================== API ====================
function toggleApi(){document.getElementById('apiPanel').classList.toggle('visible')}

function saveApiKey(){
  const k=document.getElementById('apiKey').value.trim();
  if(k){localStorage.setItem('fmp_api_key',k);document.getElementById('btnRefresh').style.display='inline-block';
    document.getElementById('apiStatus').innerHTML='<span style="color:var(--green)">API 키 저장됨</span>'}
  else{localStorage.removeItem('fmp_api_key');document.getElementById('btnRefresh').style.display='none'}
}

async function testApi(){
  const k=document.getElementById('apiKey').value.trim()||localStorage.getItem('fmp_api_key');
  if(!k){document.getElementById('apiStatus').innerHTML='<span style="color:var(--red)">API 키를 입력하세요</span>';return}
  document.getElementById('apiStatus').innerHTML='<span class="spinner"></span> 테스트 중...';
  try{
    const r=await fetch(`https://financialmodelingprep.com/api/v3/profile/AAPL?apikey=${k}`);
    const d=await r.json();
    if(d[0]&&d[0].symbol){document.getElementById('apiStatus').innerHTML=`<span style="color:var(--green)">연결 성공! AAPL: $${d[0].price}</span>`}
    else{document.getElementById('apiStatus').innerHTML='<span style="color:var(--red)">API 키가 유효하지 않습니다</span>'}
  }catch(e){document.getElementById('apiStatus').innerHTML=`<span style="color:var(--red)">오류: ${e.message}</span>`}
}

async function refreshData(){
  const k=localStorage.getItem('fmp_api_key');
  if(!k){alert('API 키를 먼저 설정하세요');return}
  const btn=document.getElementById('btnRefresh');
  btn.disabled=true;btn.textContent='갱신 중...';
  try{
    for(const t of TICKERS){
      const [profile,ratios,metrics]=await Promise.all([
        fetch(`https://financialmodelingprep.com/api/v3/profile/${t}?apikey=${k}`).then(r=>r.json()),
        fetch(`https://financialmodelingprep.com/api/v3/ratios-ttm/${t}?apikey=${k}`).then(r=>r.json()),
        fetch(`https://financialmodelingprep.com/api/v3/key-metrics-ttm/${t}?apikey=${k}`).then(r=>r.json()),
      ]);
      const p=profile[0]||{};const rt=ratios[0]||{};const mt=metrics[0]||{};
      if(p.price)DATA[t].price=+p.price.toFixed(2);
      if(p.mktCap)DATA[t].mcap=(p.mktCap/1e12).toFixed(2)+'T';
      if(rt.peRatioTTM)DATA[t].pe=+rt.peRatioTTM.toFixed(2);
      if(rt.priceToSalesRatioTTM)DATA[t].ps=+rt.priceToSalesRatioTTM.toFixed(2);
      if(rt.pegRatioTTM)DATA[t].peg=+rt.pegRatioTTM.toFixed(2);
      if(mt.enterpriseValueOverEBITDATTM)DATA[t].evebitda=+mt.enterpriseValueOverEBITDATTM.toFixed(2);
      if(rt.grossProfitMarginTTM)DATA[t].gm=+(rt.grossProfitMarginTTM*100).toFixed(2);
      if(rt.operatingProfitMarginTTM)DATA[t].om=+(rt.operatingProfitMarginTTM*100).toFixed(2);
      if(mt.freeCashFlowPerShareTTM&&p.price){
        // FCF per share * shares = total FCF, approximate
      }
      await new Promise(r=>setTimeout(r,200)); // rate limit
    }
    // Re-analyze
    TICKERS.forEach(t=>{analyses[t]=analyzeCompany(DATA[t])});
    renderCards();renderRankings();
    const now=new Date();
    document.getElementById('freshnessText').textContent=`${now.toLocaleDateString('ko-KR')} ${now.toLocaleTimeString('ko-KR')} 갱신`;
    document.getElementById('freshness').classList.remove('stale');
  }catch(e){alert('데이터 갱신 오류: '+e.message)}
  btn.disabled=false;btn.textContent='데이터 새로고침';
}

// keyboard
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail()});

init();
</script>
